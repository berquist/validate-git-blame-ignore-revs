---
name: Test and package distribution

# yamllint disable-line rule:truthy
on:
  workflow_dispatch:
  workflow_call:

concurrency:
  group: test-${{github.ref}}-${{github.event.pull_request.number || github.run_number}}
  cancel-in-progress: true

# For now always take the "reduced" form of the version, even for those
# actions runs that do not push to a package index.
env:
  VERSIONINGIT_FOR_PACKAGE_INDEX: true

permissions: {}

jobs:

  run-tests:
    name: Test and package on ${{ matrix.python-version }}
    runs-on: ubuntu-24.04
    container:
      image: docker.io/archlinux/archlinux:base-devel@sha256:8936df72701d320ff1d7d34e2a4e1df8dc9e137dea07126bf7a8135b2f971b35
    strategy:
      matrix:
        python-version:
          - 3.9
          - "3.10"
          - 3.11
          - 3.12
          - 3.13
          - 3.14
    permissions:
      contents: write  # needed for github-pages-deploy-action
    steps:
      - name: Install system-level dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm git libgit2
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8  # v6.0.1
        with:
          persist-credentials: false
          # so versioningit can figure out the version
          fetch-depth: 0
          fetch-tags: true
      - name: Install just command runner
        uses: extractions/setup-just@e33e0265a09d6d736e2ee1e0eb685ef1de4669ff  # v3.0.0
      - name: Install uv
        uses: astral-sh/setup-uv@eac588ad8def6316056a12d4907a9d4d84ff7a3b  # v7.3.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run tests
        run: |
          pwd
          ls -al
          echo "GITHUB_WORKSPACE: ${GITHUB_WORKSPACE}"
          just test

---
name: Test and package distribution

# yamllint disable-line rule:truthy
on:
  workflow_dispatch:
  workflow_call:

concurrency:
  group: test-${{github.ref}}-${{github.event.pull_request.number || github.run_number}}
  cancel-in-progress: true

permissions: {}

jobs:

  run-tests:
    name: Test and package on ${{ matrix.python-version }}
    runs-on: ubuntu-24.04
    container:
      image: docker.io/archlinux/archlinux:base-devel@sha256:268bcb94e9aa00b151b9fbe67557cc501accda145e75b7427a2d4834b6485423
    strategy:
      matrix:
        python-version:
          - 3.9
          - "3.10"
          - 3.11
          - 3.12
          - 3.13
          - 3.14
    permissions:
      contents: write  # needed for github-pages-deploy-action
    steps:
      - name: Install system-level dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm git libgit2
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803  # v6.1.0
        with:
          persist-credentials: false
      - name: Install just command runner
        uses: extractions/setup-just@f8a3cce218d9f83db3a2ecd90e41ac3de6cdfd9b  # v3.1.0
      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78  # v7.6.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run tests
        run: |
          pwd
          ls -al
          echo "GITHUB_WORKSPACE: ${GITHUB_WORKSPACE}"
          just test
